# magic_deeplink install manifest (PluginInstaller DSL schema v1).
#
# Deeplink is a Magic-side plugin: install registers DeeplinkArtisanProvider
# into the consumer's lib/app/_plugins.g.dart codegen barrel (via the artisan
# manifest installer's _registerArtisanProvider step) AND injects
# DeeplinkServiceProvider into lib/config/app.dart's providers list so the
# Magic IoC container resolves the runtime Deeplink facade.
#
# No stub files are published: deeplink handlers are scaffolded on demand
# by `dart run artisan deeplink:generate`, not at install time.
#
# See doc/install_yaml_schema.md (in fluttersdk_artisan) for the full schema.

plugin_name: magic_deeplink

publish: {}

magic:
  provider: DeeplinkServiceProvider

post_install:
  message: |
    magic_deeplink plugin:installed. Bootstrap workflow:

    1. Verify the IoC wiring (auto-injected by `magic:install`):

         lib/config/app.dart:
           providers: [
             ...,
             (app) => DeeplinkServiceProvider(app),
           ],

    2. Register deeplink handlers in a ServiceProvider's boot() body:

         Deeplink.register('/users/:id', UserDeeplinkHandler.new);
         Deeplink.register('/orders/:id', OrderDeeplinkHandler.new);

    3. Scaffold new handlers via the generator:

         dart run artisan deeplink:generate UserDeeplinkHandler --route='/users/:id'

    4. Verify the CLI:

         dart run artisan list   # includes deeplink:install + deeplink:generate
