name: magic_deeplink
description: Deep linking support for Magic Framework (Universal Links, App Links).
version: 0.0.1
homepage: https://magic.fluttersdk.com
publish_to: none

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  magic:
    path: ../magic
  magic_cli:
    path: ../magic/plugins/magic_cli
  app_links: ^6.3.2
  args: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.25.0
  flutter_lints: ^6.0.0

executables:
  deeplink: deeplink
